<body>

	<h1>
		Creating A Marquee Effect With CSS Animations
	</h1>

	<div class="marquee">
		<div class="marquee__item">
			 <div class="sponsor-slot">
        <a href="https://www.hbku.edu.qa/en/stem" target="_blank">
          <img src="Logos/HBKU logo.png" alt="HBKU" width="300px" height="150">
        </a>
      </div>
      <div class="sponsor-slot">
        <a href="https://www.dohacollege.com/" target="_blank">
          <img src="Logos/Doha-College.png" alt="DC" width="300" height="150">
        </a>
      </div>
		</div>
		<!--
			Duplication of the content in order to create a seamless wrapping simulation.
			As the element ABOVE heads off screen-left, the element BELOW will enter
			screen-right.
		-->
		<div class="marquee__item">
                <a href="https://www.hbku.edu.qa/en/stem" target="_blank">
                <img src="Logos/HBKU logo.png" alt="HBKU" width="300px" height="150">
                </a>
                <a href="https://www.dohacollege.com/" target="_blank">
                <img src="Logos/Doha-College.png" alt="DC" width="300" height="150">
                </a>
		</div>
	</div>

</body>
</html>
